# aivpn-web nginx reverse-proxy configuration
#
# Prerequisites:
#   - aivpn-web (Hono/Bun) must be running on 127.0.0.1:8080
#   - Replace SSL certificate paths before use (see TLS section below)
#
# Tested with nginx 1.24+

# ── Upstream ─────────────────────────────────────────────────────────────────

upstream aivpn_web {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    server_name _;

    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name _;   # replace with your actual domain, e.g.: vpn.example.com

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Replace the paths below with your real certificate files.
    #
    # Let's Encrypt (certbot):
    #   ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    #
    # Manual / self-signed:
    #   ssl_certificate     /etc/ssl/certs/aivpn-web.crt;
    #   ssl_certificate_key /etc/ssl/private/aivpn-web.key;

    ssl_certificate     /etc/ssl/certs/aivpn-web.crt;       # <-- REPLACE
    ssl_certificate_key /etc/ssl/private/aivpn-web.key;     # <-- REPLACE

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (optional, remove if using self-signed certs)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── Size / timeout defaults ───────────────────────────────────────────────

    client_max_body_size 100m;   # allow large backup imports

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Gzip compression ─────────────────────────────────────────────────────

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    # CSP is intentionally omitted here — aivpn-web sets its own CSP header.
    # Avoid duplicating it; browsers apply the most restrictive of the two.

    add_header X-Frame-Options          "DENY"                          always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Common proxy settings (applied to all locations below) ───────────────

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";   # enable keepalive to upstream

    # ── SSE endpoint — must NOT be buffered ──────────────────────────────────

    location = /web/events {
        proxy_pass http://aivpn_web;

        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       3600s;   # keep SSE connections alive for up to 1 h
        proxy_send_timeout       3600s;

        # Tell nginx itself (and any CDN in front) not to buffer
        add_header X-Accel-Buffering "no" always;

        # Inherit security headers from the parent server block
        add_header X-Frame-Options          "DENY"                          always;
        add_header X-Content-Type-Options   "nosniff"                       always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Backup export — large binary, extended timeouts ──────────────────────

    location = /api/v1/backup/export {
        proxy_pass http://aivpn_web;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        # Disable buffering so the binary streams to the client without being
        # held in an nginx temp file first
        proxy_buffering off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Everything else ───────────────────────────────────────────────────────

    location / {
        proxy_pass http://aivpn_web;
    }
}
