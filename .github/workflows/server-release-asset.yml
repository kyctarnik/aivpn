name: Server Release Asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to upload to. Required only for manual runs that should publish to a release.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux-server-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Linux server asset via Docker
        run: make server-docker

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivpn-server-linux-x86_64
          path: releases/aivpn-server-linux-x86_64
          if-no-files-found: error

      - name: Publish asset to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: releases/aivpn-server-linux-x86_64
          fail_on_unmatched_files: true

  build-macos-release-assets:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Build macOS .app + .pkg + .dmg
        run: make macos

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aivpn-macos-release-assets
          path: |
            releases/aivpn-macos.pkg
            releases/aivpn-macos.dmg
          if-no-files-found: error

      - name: Publish macOS assets to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            releases/aivpn-macos.pkg
            releases/aivpn-macos.dmg
          fail_on_unmatched_files: true

  build-android-release-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build prerequisites
        run: |
          sdkmanager "ndk;27.2.12479018"
          cargo install cargo-ndk
          rustup target add aarch64-linux-android armv7-linux-androideabi
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Build Android release APK
        run: make android ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ANDROID_NDK_ROOT=$ANDROID_NDK_HOME

      - name: Upload Android workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivpn-client-android-apk
          path: releases/aivpn-android.apk
          if-no-files-found: error

      - name: Publish Android APK to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: releases/aivpn-android.apk
          fail_on_unmatched_files: true

  build-musl-release-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - make_target: server-musl-armv7
            artifact_name: aivpn-server-linux-armv7-musleabihf
          - make_target: server-musl-mipsel
            artifact_name: aivpn-server-linux-mipsel-musl
          - make_target: server-musl-aarch64
            artifact_name: aivpn-server-linux-aarch64-musl
          - make_target: client-musl-armv7
            artifact_name: aivpn-client-linux-armv7-musleabihf
          - make_target: client-musl-mipsel
            artifact_name: aivpn-client-linux-mipsel-musl
          - make_target: client-musl-aarch64
            artifact_name: aivpn-client-linux-aarch64-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build musl release artifact
        run: make ${{ matrix.make_target }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: releases/${{ matrix.artifact_name }}
          if-no-files-found: error

      - name: Publish asset to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: releases/${{ matrix.artifact_name }}
          fail_on_unmatched_files: true

  build-windows-release-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis zip

      - name: Build Windows release assets
        env:
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
        run: make windows

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aivpn-windows-release-assets
          path: |
            releases/aivpn-windows-installer.exe
            releases/aivpn-windows-gui.zip
          if-no-files-found: error

      - name: Publish Windows assets to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: |
            releases/aivpn-windows-installer.exe
            releases/aivpn-windows-gui.zip
          fail_on_unmatched_files: true

  build-ios-release-asset:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build iOS IPA
        run: make ios

      - name: Upload iOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aivpn-client-ios-ipa
          path: releases/aivpn-ios.ipa
          if-no-files-found: error

      - name: Publish iOS asset to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: releases/aivpn-ios.ipa
          fail_on_unmatched_files: true
