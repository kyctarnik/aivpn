<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring dark -->
