  <circle cx="32" cy="32" r="19" fill="none" stroke="#5E45D4" stroke-width="1.8" opacity="0.9"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#7B61FF" stroke-width="1.8" opacity="0.9"/>
  <!-- Dots -->
  <circle cx="32" cy="4"  r="2.5" fill="#5E45D4" opacity="0.85"/>
  <circle cx="53" cy="43" r="2"   fill="#5E45D4" opacity="0.75"/>
  <circle cx="11" cy="43" r="2"   fill="#5E45D4" opacity="0.75"/>
  <!-- Center -->
  <circle cx="32" cy="32" r="4" fill="#3D2BA0"/>
