  <circle cx="250" cy="210" r="66"  fill="none" stroke="#9B85FF" stroke-width="3.5" opacity="0.75"/>
  <circle cx="250" cy="210" r="15"  fill="#7B61FF" opacity="0.5" filter="url(#g-m)"/>
  <circle cx="250" cy="210" r="8"   fill="#FFFFFF" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="250" y="440" font-family="'Arial Black','Helvetica Neue',sans-serif"
