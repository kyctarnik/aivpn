<svg width="500" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-s" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1E1040"/>
      <stop offset="100%" stop-color="#0A0518"/>
    </radialGradient>
    <filter id="glow-s">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="c-s">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="600" rx="24" fill="url(#bg-s)"/>

  <!-- Rings centered at 250,210 -->
  <circle cx="250" cy="210" r="160" fill="none" stroke="#E8FF6B" stroke-width="1.5" opacity="0.3" filter="url(#glow-s)"/>
  <circle cx="250" cy="50"  r="6"  fill="#E8FF6B" opacity="0.8" filter="url(#glow-s)"/>
  <circle cx="398" cy="298" r="5"  fill="#E8FF6B" opacity="0.6"/>
  <circle cx="102" cy="298" r="5"  fill="#E8FF6B" opacity="0.6"/>

  <circle cx="250" cy="210" r="112" fill="none" stroke="#7B61FF" stroke-width="2.5" opacity="0.55" filter="url(#glow-s)"/>
  <circle cx="250" cy="98"  r="7"  fill="#9B85FF" opacity="0.95" filter="url(#glow-s)"/>
  <circle cx="347" cy="266" r="7"  fill="#9B85FF" opacity="0.95" filter="url(#glow-s)"/>
  <circle cx="153" cy="154" r="6"  fill="#9B85FF" opacity="0.85" filter="url(#glow-s)"/>

  <circle cx="250" cy="210" r="64"  fill="none" stroke="#A893FF" stroke-width="3" opacity="0.7" filter="url(#glow-s)"/>
  <circle cx="250" cy="146" r="8"  fill="#B8A8FF" opacity="0.95" filter="url(#glow-s)"/>
  <circle cx="306" cy="242" r="7"  fill="#B8A8FF" opacity="0.85"/>
  <circle cx="194" cy="242" r="7"  fill="#B8A8FF" opacity="0.85"/>

  <circle cx="250" cy="210" r="30" fill="#7B61FF" opacity="0.1" filter="url(#c-s)"/>
  <circle cx="250" cy="210" r="20" fill="none" stroke="#A893FF" stroke-width="2.5" opacity="0.8"/>
  <circle cx="250" cy="210" r="9"  fill="#E8FF6B" filter="url(#c-s)"/>
  <circle cx="250" cy="210" r="5"  fill="#FAFFB8"/>

  <!-- Wordmark below rings -->
  <text x="250" y="435" font-family="'Arial Black','Helvetica Neue',sans-serif"
        font-size="100" font-weight="900" fill="white" letter-spacing="-2" text-anchor="middle">AIVPN</text>
  <text x="250" y="475" font-family="'Arial','Helvetica Neue',sans-serif"
        font-size="16" font-weight="400" fill="#9B85FF" letter-spacing="5" text-anchor="middle">ADAPTIVE INTELLIGENCE VPN</text>

  <!-- Lemon accent line -->
  <rect x="190" y="492" width="120" height="2" rx="1" fill="#E8FF6B" opacity="0.6"/>
</svg>
