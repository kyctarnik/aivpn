name: Aivpn
options:
  bundleIdPrefix: com.aivpn
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Aivpn:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
        excludes:
          - "*.entitlements"
      # App icon lives in the shared brand folder (single source of truth across
      # all clients). ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon resolves it from
      # this externally-referenced catalog — no copy under App/.
      - path: ../../assets/brand/ios/Assets.xcassets
    info:
      path: App/Info.plist
    entitlements:
      path: App/Aivpn.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aivpn.client
        PRODUCT_NAME: Aivpn
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: App/AivpnCoreBridge.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        # Static library linked by the app process itself so BootstrapDiscovery.swift
        # can call aivpn_verify_bootstrap_descriptor() — bootstrap discovery runs in
        # the app, not the tunnel extension (see AivpnTunnel's OTHER_LDFLAGS below for
        # why: this is the same libaivpn_core.a, just also linked into this target).
        OTHER_LDFLAGS: $(inherited) -force_load $(SRCROOT)/../../crates/aivpn-ios-core/lib/libaivpn_core.a
        LIBRARY_SEARCH_PATHS: $(inherited) $(SRCROOT)/../../crates/aivpn-ios-core/lib
        HEADER_SEARCH_PATHS: $(inherited) $(SRCROOT)/../../crates/aivpn-ios-core/include
    postbuildScripts:
      - name: "Inject UILaunchScreen"
        script: |
          plist="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "$plist" 2>/dev/null || true
        runOnlyWhenInstalling: false
    dependencies:
      - target: AivpnTunnel
        embed: true

  AivpnTunnel:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tunnel
        excludes:
          - "*.entitlements"
    info:
      path: Tunnel/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: Tunnel/AivpnTunnel.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aivpn.client.tunnel
        PRODUCT_NAME: AivpnTunnel
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: Tunnel/AivpnCoreBridge.h
        GENERATE_INFOPLIST_FILE: NO
        # Static library linked by the tunnel extension (not the app)
        OTHER_LDFLAGS: $(inherited) -force_load $(SRCROOT)/../../crates/aivpn-ios-core/lib/libaivpn_core.a
        LIBRARY_SEARCH_PATHS: $(inherited) $(SRCROOT)/../../crates/aivpn-ios-core/lib
        HEADER_SEARCH_PATHS: $(inherited) $(SRCROOT)/../../crates/aivpn-ios-core/include
